name: Build Flet APK

on:
 push:
 branches: [ main ]
 workflow_dispatch: # 允许手动触发

jobs:
 build:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - uses: actions/setup-python@v5
 with:
 python-version: "3.12"

 - name: Install Java 17
 uses: actions/setup-java@v4
 with:
 distribution: "zulu"
 java-version: "17"

 - name: Setup Android SDK
 uses: android-actions/setup-android@v3

 - name: Install Flet
 run: pip install --upgrade flet

 - name: Build APK
 run: flet build apk --project-name my_flet_app --product-name 收入纳税明细 --package-name com.example.taxapp

 - name: Upload APK
 uses: actions/upload-artifact@v4
 with:
 name: app-release
 path: build/app/outputs/flutter-apk/*.apk
